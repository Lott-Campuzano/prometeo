<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prometeo</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <div class="container my-3">
    <div class="d-flex justify-content-end mb-2">
  <button id="logoutBtn" class="btn btn-outline-danger btn-sm">
    <i class="bi bi-box-arrow-right"></i> Cerrar sesión
  </button>
</div>

    <h1 class="text-center text-xl font-weight-bold">
            Hola de nuevo
        </h1>

    <div class="bg-white rounded-4 shadow p-4 mx-auto" style="max-width: 1000rem;">

      <div class="chat-messages border rounded-3 p-3 mb-3 bg-light" id="chatMessages"></div>
      <form id="chatForm">
        <div class="input-group px-3 py-2">
          <textarea id="userInput" class="form-control border-0 rounded-pill px-3" placeholder="Escribe tu mensaje..." required rows="1" style="resize: none;"></textarea>
          <button type="submit" class="btn btn-primary rounded-pill px-4 d-flex align-items-center justify-content-center">
            <i class="bi bi-send-fill"></i>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/funciones.js"></script>
</body>
</html>
